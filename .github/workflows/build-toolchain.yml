name: Build toolchain

# The full build takes ~60-90 min on a standard runner, so it does NOT run on
# ordinary pushes/PRs. Trigger it manually (Actions -> Build toolchain -> Run
# workflow) or by pushing a v* tag (which also publishes a GitHub Release).
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to attach the tarball to a Release on tag builds

concurrency:
  group: build-toolchain-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential wget xz-utils bzip2 libgmp-dev file ca-certificates

      # Cache the upstream GNU source tarballs (binutils/gcc/gdb + prerequisites)
      # between runs; the versions are pinned inside build-toolchain.sh.
      - name: Cache GNU sources
        uses: actions/cache@v4
        with:
          path: .build/src
          key: gnu-src-${{ hashFiles('build-toolchain.sh') }}

      - name: Build and verify the toolchain
        run: ./build-toolchain.sh   # downloads sources, builds, packages, self-verifies

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctc-linux64-atom-2.1.4.14-modern
          path: |
            output/*.tar.xz
            output/*.tar.xz.sha256
          if-no-files-found: error
          retention-days: 30

      - name: Publish release (tag builds only)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            output/*.tar.xz
            output/*.tar.xz.sha256
          generate_release_notes: true
