name: Build toolchain (NAOqi 2.1 / NAO V4-V5)

# The full build takes ~60-90 min on a standard runner, so it does NOT run on
# ordinary pushes/PRs. Trigger it manually (Actions -> Run workflow), or push a
# v* tag — release.yml then runs BOTH toolchain builds and attaches both
# archives to a single release.
on:
  workflow_dispatch:
  workflow_call:   # invoked by release.yml, which attaches both toolchains to one release

permissions:
  contents: read

concurrency:
  group: build-toolchain-2.1-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install host build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential wget xz-utils bzip2 libgmp-dev file pkg-config ca-certificates

      # Cache the upstream GNU source tarballs (binutils/gcc/gdb + prerequisites)
      # between runs; the versions are pinned inside build-toolchain.sh.
      - name: Cache GNU sources
        uses: actions/cache@v4
        with:
          path: naoqi-2.1/.build/src
          key: gnu-src-${{ hashFiles('naoqi-2.1/build-toolchain.sh') }}

      - name: Build and verify the toolchain
        run: ./naoqi-2.1/build-toolchain.sh   # downloads sources, builds, packages, self-verifies

      # Integration gate: the freshly built toolchain must compile AND run a real
      # program. CI has no NAOqi SDK, so this builds+runs the plain example (the
      # NAOqi examples build wherever the original ctc is available, via CTC=).
      - name: Build example programs with the toolchain
        run: ./naoqi-2.1/examples/build-examples.sh

      # Coexistence gate: a C++17 module and a gnu++11 module linked into one
      # binary with a uniform old libstdc++ ABI (the gRPC-with-NAOqi pattern). CI
      # has neither the gRPC stack nor the NAOqi SDK, so it builds+runs the
      # all-stub variant; the real gRPC/NAOqi implementations swap in locally.
      - name: Build the gRPC + NAOqi coexistence demo
        run: ./naoqi-2.1/examples/build-grpc-naoqi.sh

      - name: Upload toolchain artifact
        uses: actions/upload-artifact@v4
        with:
          name: ctc-linux64-atom-2.1.4.14-modern
          path: |
            naoqi-2.1/output/*.tar.xz
            naoqi-2.1/output/*.tar.xz.sha256
          if-no-files-found: error
          retention-days: 30

